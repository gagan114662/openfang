version = 1
generated_for = "openfang-native-unattended-autofix"

[[workloads]]
id = "ops_guard_cycle"
agent_name = "ops-coder"
schedule_kind = "cron"
schedule = "*/5 * * * *"
message = "Run the unattended guard cycle. Verify daemon health, Telegram poller uniqueness, and Sentry heartbeat visibility. Report the result to /api/ops/guard/report and update current-state artifacts."
purpose = "Keep the primary daemon healthy and visible in Sentry every 5 minutes."
expected_output_artifact = "artifacts/autonomy/current-state.json"
sentry_success_query = "event.kind:ops.guard.heartbeat"
sentry_failure_query = "event.kind:ops.guard.failed"
max_consecutive_failures = 3
requires_browser_session = false
preferred_browser_host = "gpu"
fallback_browser_host = "mac"
required_tools = ["web_fetch"]
required_budget_policy = "global-only"
expected_trace_transaction = "ops.guard.cycle"
enabled = true
overdue_grace_secs = 300
autofix_allowed = true
deploy_allowed = false
rollback_allowed = false

