name: harness-weekly-metrics

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  harness-weekly-metrics:
    name: harness-weekly-metrics
    runs-on: ubuntu-latest
    steps:
      - name: Generate weekly harness metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import datetime as dt
          import io
          import json
          import statistics
          import urllib.request
          import zipfile
          from pathlib import Path

          token = __import__('os').environ['GITHUB_TOKEN']
          repo = __import__('os').environ['REPO']
          now = dt.datetime.now(dt.timezone.utc)
          week_ago = now - dt.timedelta(days=7)

          headers = {
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Authorization': f'Bearer {token}',
          }

          def get_json(url: str):
              req = urllib.request.Request(url, headers=headers, method='GET')
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return json.loads(resp.read().decode('utf-8'))

          def get_bytes(url: str):
              req = urllib.request.Request(url, headers=headers, method='GET')
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return resp.read()

          def parse_iso(value: str):
              return dt.datetime.fromisoformat(value.replace('Z', '+00:00'))

          runs_url = f'https://api.github.com/repos/{repo}/actions/workflows/risk-policy-gate.yml/runs?per_page=100'
          risk_runs = get_json(runs_url).get('workflow_runs', [])

          reports = []
          latencies = []

          for run in risk_runs:
              created = parse_iso(run['created_at'])
              if created < week_ago:
                  continue

              updated = parse_iso(run['updated_at'])
              latencies.append((updated - created).total_seconds())

              artifacts_url = run['artifacts_url']
              artifacts = get_json(artifacts_url).get('artifacts', [])
              report_artifact = next((a for a in artifacts if a.get('name') == 'risk-policy-report'), None)
              if not report_artifact:
                  continue

              zip_bytes = get_bytes(report_artifact['archive_download_url'])
              with zipfile.ZipFile(io.BytesIO(zip_bytes)) as zf:
                  for name in zf.namelist():
                      if name.endswith('risk-policy-report.json'):
                          reports.append(json.loads(zf.read(name).decode('utf-8')))
                          break

          stale_review_incidents = sum(1 for report in reports if report.get('decision') in {'stale-review', 'timeout'})

          rerun_count_per_pr = {}
          for report in reports:
              if report.get('decision') in {'stale-review', 'timeout'}:
                  pr = str(report.get('pr_number'))
                  rerun_count_per_pr[pr] = rerun_count_per_pr.get(pr, 0) + 1

          high_reports = [report for report in reports if report.get('risk_tier') == 'high']
          high_pass = sum(1 for report in high_reports if report.get('decision') == 'pass')
          high_tier_pass_rate = (high_pass / len(high_reports)) if high_reports else 1.0

          remediation_runs_url = f'https://api.github.com/repos/{repo}/actions/workflows/claude-remediation-agent.yml/runs?per_page=100'
          remediation_runs = get_json(remediation_runs_url).get('workflow_runs', [])
          remediation_recent = [
              run for run in remediation_runs
              if parse_iso(run['created_at']) >= week_ago and run.get('event') == 'pull_request'
          ]
          remediation_total = len(remediation_recent)
          remediation_success = sum(1 for run in remediation_recent if run.get('conclusion') == 'success')
          remediation_success_rate = (remediation_success / remediation_total) if remediation_total else 1.0

          median_gate_latency_seconds = statistics.median(latencies) if latencies else 0.0

          metrics = {
              'generated_at': now.isoformat(),
              'window': {
                  'start': week_ago.isoformat(),
                  'end': now.isoformat(),
              },
              'risk_policy_gate_runs_considered': len(latencies),
              'reports_parsed': len(reports),
              'stale_review_incidents': stale_review_incidents,
              'rerun_count_per_pr': rerun_count_per_pr,
              'remediation_success_rate': remediation_success_rate,
              'median_gate_latency_seconds': median_gate_latency_seconds,
              'high_tier_pr_pass_rate': high_tier_pass_rate,
          }

          Path('artifacts/harness-weekly-metrics.json').write_text(
              json.dumps(metrics, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )

          lines = [
              '# Harness Weekly Metrics',
              '',
              f"- Window start: {metrics['window']['start']}",
              f"- Window end: {metrics['window']['end']}",
              f"- Risk gate runs considered: {metrics['risk_policy_gate_runs_considered']}",
              f"- Reports parsed: {metrics['reports_parsed']}",
              f"- Stale-review incidents: {metrics['stale_review_incidents']}",
              f"- Median gate latency (s): {metrics['median_gate_latency_seconds']:.2f}",
              f"- High-tier PR pass rate: {metrics['high_tier_pr_pass_rate']:.2%}",
              f"- Remediation success rate: {metrics['remediation_success_rate']:.2%}",
              '',
              '## Reruns Per PR',
          ]

          if metrics['rerun_count_per_pr']:
              for pr, count in sorted(metrics['rerun_count_per_pr'].items(), key=lambda item: int(item[0])):
                  lines.append(f"- PR #{pr}: {count}")
          else:
              lines.append('- No stale-review reruns in this window')

          markdown = '\n'.join(lines) + '\n'
          Path('artifacts/harness-weekly-metrics.md').write_text(markdown, encoding='utf-8')
          PY

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness-weekly-metrics
          path: |
            artifacts/harness-weekly-metrics.json
            artifacts/harness-weekly-metrics.md

      - name: Publish summary
        run: cat artifacts/harness-weekly-metrics.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post or update weekly issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('artifacts/harness-weekly-metrics.md', 'utf8');
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            let metricsIssue = issues.find((issue) => issue.title === 'Harness Weekly Metrics' && !issue.pull_request);

            if (!metricsIssue) {
              metricsIssue = (await github.rest.issues.create({
                owner,
                repo,
                title: 'Harness Weekly Metrics',
                body,
              })).data;
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: metricsIssue.number,
                body,
              });
            }
