name: ci-fanout

on:
  workflow_run:
    workflows: [risk-policy-gate]
    types: [completed]

permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  preflight:
    name: preflight
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    outputs:
      required_checks_json: ${{ steps.parse.outputs.required_checks_json }}
      risk_tier: ${{ steps.parse.outputs.risk_tier }}
      head_sha: ${{ steps.parse.outputs.head_sha }}
      pr_number: ${{ steps.parse.outputs.pr_number }}
      rollout_phase: ${{ steps.parse.outputs.rollout_phase }}
      should_fanout: ${{ steps.parse.outputs.should_fanout }}
    steps:
      - name: Download risk policy artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: risk-policy-report
          path: artifacts

      - name: Parse gate report
        id: parse
        run: |
          REPORT="artifacts/risk-policy-report.json"
          test -f "$REPORT"

          required_checks_json=$(jq -c '.required_checks' "$REPORT")
          risk_tier=$(jq -r '.risk_tier' "$REPORT")
          head_sha=$(jq -r '.head_sha' "$REPORT")
          pr_number=$(jq -r '.pr_number' "$REPORT")
          rollout_phase=$(jq -r '.rollout_phase // "phase-0"' "$REPORT")
          run_fanout_on_failure=$(jq -r '.rollout.runFanoutOnGateFailure // false' "$REPORT")
          gate_conclusion="${{ github.event.workflow_run.conclusion }}"

          should_fanout="false"
          if [ "$gate_conclusion" = "success" ]; then
            should_fanout="true"
          elif [ "$run_fanout_on_failure" = "true" ]; then
            should_fanout="true"
          fi

          echo "required_checks_json=$required_checks_json" >> "$GITHUB_OUTPUT"
          echo "risk_tier=$risk_tier" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "rollout_phase=$rollout_phase" >> "$GITHUB_OUTPUT"
          echo "should_fanout=$should_fanout" >> "$GITHUB_OUTPUT"

          echo "## CI Fanout Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: #$pr_number" >> "$GITHUB_STEP_SUMMARY"
          echo "- Risk tier: $risk_tier" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rollout phase: $rollout_phase" >> "$GITHUB_STEP_SUMMARY"
          echo "- Risk gate conclusion: $gate_conclusion" >> "$GITHUB_STEP_SUMMARY"
          echo "- Fanout enabled: $should_fanout" >> "$GITHUB_STEP_SUMMARY"
          echo "- Required checks: $required_checks_json" >> "$GITHUB_STEP_SUMMARY"

  ci-check:
    name: ci-check
    needs: preflight
    if: ${{ needs.preflight.result == 'success' && needs.preflight.outputs.should_fanout == 'true' && contains(fromJSON(needs.preflight.outputs.required_checks_json), 'ci-check') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-check
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo check --workspace

  ci-test:
    name: ci-test
    needs: preflight
    if: ${{ needs.preflight.result == 'success' && needs.preflight.outputs.should_fanout == 'true' && contains(fromJSON(needs.preflight.outputs.required_checks_json), 'ci-test') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-test
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo test --workspace

  ci-clippy:
    name: ci-clippy
    needs: preflight
    if: ${{ needs.preflight.result == 'success' && needs.preflight.outputs.should_fanout == 'true' && contains(fromJSON(needs.preflight.outputs.required_checks_json), 'ci-clippy') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-clippy
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: cargo clippy --workspace -- -D warnings

  ci-fmt:
    name: ci-fmt
    needs: preflight
    if: ${{ needs.preflight.result == 'success' && needs.preflight.outputs.should_fanout == 'true' && contains(fromJSON(needs.preflight.outputs.required_checks_json), 'ci-fmt') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  ci-audit:
    name: ci-audit
    needs: preflight
    if: ${{ needs.preflight.result == 'success' && needs.preflight.outputs.should_fanout == 'true' && contains(fromJSON(needs.preflight.outputs.required_checks_json), 'ci-audit') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-audit
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit

  ci-secrets:
    name: ci-secrets
    needs: preflight
    if: ${{ needs.preflight.result == 'success' && needs.preflight.outputs.should_fanout == 'true' && contains(fromJSON(needs.preflight.outputs.required_checks_json), 'ci-secrets') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}
          fetch-depth: 0
      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan for secrets
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --exclude-paths=<(echo -e "target/\n.git/\nCargo.lock\nintegrations/")

  ci-install-smoke:
    needs: preflight
    if: ${{ needs.preflight.result == 'success' && needs.preflight.outputs.should_fanout == 'true' && contains(fromJSON(needs.preflight.outputs.required_checks_json), 'ci-install-smoke') }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and syntax-check shell installer
        run: |
          curl -fsSL https://openfang.sh/install -o /tmp/install.sh
          bash -n /tmp/install.sh
      - name: Fetch and syntax-check PowerShell installer
        run: |
          curl -fsSL https://openfang.sh/install.ps1 -o /tmp/install.ps1
          pwsh -NoProfile -Command "Get-Content /tmp/install.ps1 | Out-Null" 2>&1 || true
