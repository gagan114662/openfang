name: invariant-nightly

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: invariant-nightly
  cancel-in-progress: false

jobs:
  invariant-check:
    name: invariant-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Shell-based checks (config type map, route registration)
      - name: Run shell invariant checks
        id: shell_checks
        run: bash scripts/check_invariants.sh 2>&1 | tee /tmp/invariant-shell.txt
        continue-on-error: true

      # Rust invariant tests (provider sync, catalog sync)
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: invariant-nightly
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Run Rust invariant tests
        id: rust_tests
        run: |
          cargo test -p openfang-runtime -- invariant test_known_providers test_defaults_all 2>&1 \
            | tee /tmp/invariant-rust.txt
        continue-on-error: true

      # Build JSON report
      - name: Build report
        id: report
        run: |
          SHELL_OK=${{ steps.shell_checks.outcome == 'success' }}
          RUST_OK=${{ steps.rust_tests.outcome == 'success' }}
          ALL_OK=true
          [[ "$SHELL_OK" != "true" || "$RUST_OK" != "true" ]] && ALL_OK=false

          SHELL_LOG=$(head -50 /tmp/invariant-shell.txt | sed 's/"/\\"/g' | tr '\n' '|')
          RUST_LOG=$(tail -20 /tmp/invariant-rust.txt | sed 's/"/\\"/g' | tr '\n' '|')

          cat > /tmp/invariant-report.json <<ENDJSON
          {
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "all_passed": $ALL_OK,
            "shell_checks_passed": $SHELL_OK,
            "rust_tests_passed": $RUST_OK,
            "shell_output": "$SHELL_LOG",
            "rust_output": "$RUST_LOG"
          }
          ENDJSON

          echo "all_ok=$ALL_OK" >> "$GITHUB_OUTPUT"

      # Upload artifact
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invariant-nightly-report
          path: /tmp/invariant-report.json

      # Update persistent GitHub issue
      - name: Update GitHub issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const shellLog = fs.readFileSync('/tmp/invariant-shell.txt', 'utf8');
            const rustLog = fs.readFileSync('/tmp/invariant-rust.txt', 'utf8').split('\n').slice(-20).join('\n');
            const allOk = '${{ steps.report.outputs.all_ok }}' === 'true';
            const badge = allOk ? '✅' : '❌';
            const title = 'Invariant Health Report';
            const body = [
              `## ${badge} Invariant Nightly — ${new Date().toISOString().slice(0,10)}`,
              '',
              '### Shell Checks (config type map, route registration)',
              '```',
              shellLog.trim(),
              '```',
              '',
              '### Rust Tests (provider sync, catalog sync)',
              '```',
              rustLog.trim(),
              '```',
              '',
              `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'invariant-health', state: 'open', per_page: 1,
            });

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['invariant-health'],
              });
            }

      # Emit Sentry telemetry (matches existing pattern)
      - name: Emit Sentry telemetry
        if: always()
        env:
          OPENFANG_SENTRY_WORKFLOW_EVENTS: ${{ vars.OPENFANG_SENTRY_WORKFLOW_EVENTS || 'true' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          python3 scripts/harness/workflow_sentry_emit.py \
            --workflow "invariant-nightly" \
            --job "invariant-check" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --event "${{ github.event_name }}" \
            --repo "${{ github.repository }}" \
            --head-sha "${{ github.sha }}" \
            --status "${{ steps.report.outputs.all_ok == 'true' && 'success' || 'failure' }}" \
            --emit "${OPENFANG_SENTRY_WORKFLOW_EVENTS}" \
            --emit-on-failure-only "true" \
            --sentry-dsn-env "SENTRY_DSN" \
            --out /tmp/sentry-workflow-emit.json

      - name: Upload workflow telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invariant-nightly-sentry-telemetry
          path: /tmp/sentry-workflow-emit.json
          if-no-files-found: warn

      # Fail the job if any check failed
      - name: Gate
        if: steps.report.outputs.all_ok != 'true'
        run: exit 1
