# Monitoring overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Adds Loki (log aggregation), Promtail (log scraper), and Grafana (dashboard)
# to the base OpenFang stack.

services:
  # Override: mount monitoring config + ensure JSON logs go to shared volume
  openfang:
    command: ["start", "--config", "/etc/openfang/config.toml"]
    volumes:
      - openfang-data:/data
      - ./monitoring/openfang-monitoring.toml:/etc/openfang/config.toml:ro

  loki:
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - openfang-data:/data:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-openfang}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/openfang-agents.json
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
